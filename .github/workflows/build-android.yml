name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: "stable"
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

      - name: Set up release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            {
              echo "storeFile=release.jks"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
            } > android/key.properties
            echo "Release keystore configured."
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret — falling back to debug signing." >&2
            echo "APKs from this build will NOT install over release-signed ones." >&2
          fi

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v7
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publish a rolling "latest" release with the APK attached
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest build (${{ github.sha }})
          prerelease: true
          files: build/app/outputs/flutter-apk/app-release.apk
